<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聊天 - Autoconfig</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/app.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
    <style>
        .chat-page{min-height:100vh;background:var(--bg-dark);display:flex;flex-direction:column}
        .chat-header{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;gap:16px;padding:12px 20px;background:var(--bg-card);border-bottom:1px solid var(--border)}
        .chat-header .logo{display:flex;align-items:center;gap:6px;color:var(--text-primary);text-decoration:none;font-weight:700;font-size:1rem}
        .chat-header .logo .icon{font-size:1.2rem}
        .chat-header h2{flex:1;font-size:1.1rem;color:var(--text-primary);font-weight:700}
        .chat-header .btn-back{color:var(--text-muted);text-decoration:none;font-size:.85rem;padding:6px 12px;border-radius:6px;border:1px solid var(--border);transition:all .2s}
        .chat-header .btn-back:hover{color:var(--text-primary);border-color:var(--border-hover)}
        .chat-container{display:flex;flex:1;margin-top:56px;height:calc(100vh - 56px)}
        /* 左侧会话列表 */
        .chat-sidebar{width:300px;border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--bg-card);flex-shrink:0}
        .sidebar-header{padding:16px;border-bottom:1px solid var(--border);font-size:.9rem;font-weight:700;color:var(--text-primary)}
        .conversation-list{flex:1;overflow-y:auto}
        .conv-item{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;transition:all .15s;border-bottom:1px solid rgba(255,255,255,.03)}
        .conv-item:hover{background:rgba(255,255,255,.03)}
        .conv-item.active{background:rgba(99,102,241,.1);border-left:3px solid var(--primary)}
        .conv-avatar{width:40px;height:40px;border-radius:50%;background:var(--gradient-2);display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:.9rem;flex-shrink:0}
        .conv-info{flex:1;min-width:0}
        .conv-name{font-size:.88rem;font-weight:600;color:var(--text-primary)}
        .conv-last{font-size:.78rem;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
        .conv-meta{text-align:right;flex-shrink:0}
        .conv-time{font-size:.7rem;color:var(--text-muted);display:block}
        .conv-unread{display:inline-block;min-width:18px;height:18px;padding:0 5px;border-radius:999px;background:#ef4444;color:#fff;font-size:.65rem;font-weight:700;line-height:18px;text-align:center;margin-top:4px}
        .no-conversations{padding:40px 20px;text-align:center;color:var(--text-muted);font-size:.9rem}
        /* 右侧消息区 */
        .chat-main{flex:1;display:flex;flex-direction:column;min-width:0}
        .chat-main-empty{flex:1;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:1rem}
        .msg-header{display:flex;align-items:center;gap:12px;padding:12px 20px;border-bottom:1px solid var(--border);background:rgba(255,255,255,.02)}
        .msg-header .msg-username{font-size:1rem;font-weight:700;color:var(--text-primary)}
        .msg-header .msg-bio{font-size:.8rem;color:var(--text-muted)}
        .msg-header-actions{margin-left:auto;display:flex;gap:8px}
        .btn-gift{padding:6px 14px;border-radius:6px;font-size:.82rem;font-weight:600;cursor:pointer;border:1px solid rgba(234,179,8,.3);background:rgba(234,179,8,.1);color:#eab308;font-family:inherit;transition:all .15s}
        .btn-gift:hover{background:rgba(234,179,8,.2)}
        .messages-area{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:8px}
        .msg-item{display:flex;gap:8px;max-width:70%;animation:fadeIn .2s}
        .msg-item.me{align-self:flex-end;flex-direction:row-reverse}
        .msg-bubble{padding:10px 14px;border-radius:12px;font-size:.88rem;line-height:1.5;word-break:break-word}
        .msg-item.other .msg-bubble{background:var(--bg-card);border:1px solid var(--border);color:var(--text-primary);border-bottom-left-radius:4px}
        .msg-item.me .msg-bubble{background:var(--primary);color:#fff;border-bottom-right-radius:4px}
        .msg-item.gift .msg-bubble{background:rgba(234,179,8,.1);border:1px solid rgba(234,179,8,.3);color:#eab308;text-align:center;border-radius:12px}
        .msg-time{font-size:.65rem;color:var(--text-muted);align-self:flex-end;flex-shrink:0}
        .msg-date-sep{text-align:center;padding:8px;font-size:.75rem;color:var(--text-muted)}
        .msg-avatar{width:28px;height:28px;border-radius:50%;background:var(--gradient-2);display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:.65rem;flex-shrink:0;margin-top:4px}
        /* 输入区域 */
        .msg-input-area{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:10px;background:rgba(255,255,255,.02)}
        .msg-input{flex:1;padding:10px 14px;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;color:var(--text-primary);font-size:.9rem;font-family:inherit;outline:none;resize:none}
        .msg-input:focus{border-color:var(--primary)}
        .msg-send-btn{padding:10px 20px;background:var(--gradient-2);color:#fff;border:none;border-radius:8px;font-size:.88rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap}
        .msg-send-btn:hover{box-shadow:0 4px 20px var(--primary-glow)}
        .msg-send-btn:disabled{opacity:.5;cursor:not-allowed}
        /* Gift modal */
        .gift-modal{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;display:none;align-items:center;justify-content:center}
        .gift-modal.show{display:flex}
        .gift-box{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:24px;width:360px;max-width:90vw}
        .gift-box h3{margin-bottom:16px;color:var(--text-primary);font-size:1.1rem}
        .gift-box input{width:100%;padding:10px 14px;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:8px;color:var(--text-primary);font-size:1rem;margin-bottom:12px;outline:none;font-family:inherit}
        .gift-box input:focus{border-color:var(--primary)}
        .gift-box .gift-balance{font-size:.82rem;color:var(--text-muted);margin-bottom:16px}
        .gift-box .gift-actions{display:flex;gap:8px;justify-content:flex-end}
        .gift-box .btn-cancel{padding:8px 16px;border-radius:6px;background:transparent;border:1px solid var(--border);color:var(--text-muted);cursor:pointer;font-family:inherit;font-size:.85rem}
        .gift-box .btn-confirm{padding:8px 16px;border-radius:6px;background:#eab308;border:none;color:#000;font-weight:600;cursor:pointer;font-family:inherit;font-size:.85rem}
        @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
        @media(max-width:768px){.chat-sidebar{width:80px}.conv-info,.conv-meta,.sidebar-header span{display:none}.conv-item{justify-content:center;padding:12px 8px}}
    </style>
</head>
<body>
    <div class="chat-page">
        <header class="chat-header">
            <a href="/dashboard" class="logo"><span class="icon">⚡</span> Autoconfig</a>
            <h2>💬 聊天</h2>
            <a href="/dashboard" class="btn-back">← 返回控制台</a>
        </header>
        <div class="chat-container">
            <aside class="chat-sidebar">
                <div class="sidebar-header">💬 <span>会话列表</span></div>
                <div class="conversation-list" id="convList">
                    <div class="no-conversations">暂无会话</div>
                </div>
            </aside>
            <div class="chat-main" id="chatMain">
                <div class="chat-main-empty" id="chatEmpty">👈 选择一个会话开始聊天</div>
            </div>
        </div>
        <!-- 赠送金币弹窗 -->
        <div class="gift-modal" id="giftModal">
            <div class="gift-box">
                <h3>🎁 赠送金币</h3>
                <div>赠送给: <strong id="giftTarget">-</strong></div>
                <input type="number" id="giftAmount" placeholder="输入金币数量" min="1" style="margin-top:12px">
                <div class="gift-balance">你的余额: <span id="giftBalance">0</span> 🪙</div>
                <div class="gift-actions">
                    <button class="btn-cancel" onclick="closeGift()">取消</button>
                    <button class="btn-confirm" onclick="confirmGift()">确认赠送</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/common.js"></script>
    <script>
        let currentUser = null;
        let activeChatUserId = null;
        let activeChatUser = null;
        let pollTimer = null;

        // URL中是否指定了聊天对象
        const chatTarget = window.location.pathname.split('/').filter(Boolean)[1] || null;

        (async () => {
            currentUser = await checkAuth();
            if (!currentUser) { window.location.href = '/login'; return; }

            loadConversations();

            // 如果URL指定了用户名，自动打开该对话
            if (chatTarget) {
                try {
                    const data = await api('/api/chat/user-by-name/' + encodeURIComponent(chatTarget));
                    if (data.user) openChat(data.user.id, data.user.username, data.user.bio);
                } catch (err) {
                    showToast('用户不存在: ' + chatTarget, 'error');
                }
            }
        })();

        async function loadConversations() {
            try {
                const data = await api('/api/chat/conversations');
                renderConversations(data.conversations);
            } catch {}
        }

        function renderConversations(conversations) {
            const el = document.getElementById('convList');
            if (!conversations.length) {
                el.innerHTML = '<div class="no-conversations">暂无会话<br><small style="color:var(--text-muted);font-size:.75rem">在项目页点击「联系作者」开始聊天</small></div>';
                return;
            }
            el.innerHTML = conversations.map(c => `
                <div class="conv-item ${c.user_id === activeChatUserId ? 'active' : ''}" onclick="openChat(${c.user_id}, '${esc(c.username)}', '')">
                    <div class="conv-avatar">${c.username[0].toUpperCase()}</div>
                    <div class="conv-info">
                        <div class="conv-name">${esc(c.username)}</div>
                        <div class="conv-last">${c.last_type === 'gift' ? '🎁 ' : ''}${esc(c.last_message || '')}</div>
                    </div>
                    <div class="conv-meta">
                        <span class="conv-time">${formatTime(c.last_time)}</span>
                        ${c.unread > 0 ? '<span class="conv-unread">' + c.unread + '</span>' : ''}
                    </div>
                </div>
            `).join('');
        }

        async function openChat(userId, username, bio) {
            activeChatUserId = userId;
            activeChatUser = { id: userId, username };
            if (pollTimer) clearInterval(pollTimer);

            // Mark sidebar active
            document.querySelectorAll('.conv-item').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.conv-item').forEach(el => {
                if (el.onclick && el.onclick.toString().includes(userId)) el.classList.add('active');
            });

            const main = document.getElementById('chatMain');
            main.innerHTML = `
                <div class="msg-header">
                    <div class="conv-avatar" style="width:36px;height:36px;font-size:.85rem">${username[0].toUpperCase()}</div>
                    <div>
                        <div class="msg-username">${esc(username)}</div>
                        <div class="msg-bio">${bio ? esc(bio) : ''}</div>
                    </div>
                    <div class="msg-header-actions">
                        <button class="btn-gift" onclick="openGift()">🎁 赠送金币</button>
                    </div>
                </div>
                <div class="messages-area" id="messagesArea"></div>
                <div class="msg-input-area">
                    <input type="text" class="msg-input" id="msgInput" placeholder="输入消息..." maxlength="1000" onkeydown="if(event.key==='Enter')sendMsg()">
                    <button class="msg-send-btn" onclick="sendMsg()">发送</button>
                </div>
            `;

            await loadMessages(userId);
            // Poll for new messages every 3s
            pollTimer = setInterval(() => loadMessages(userId, true), 3000);
        }

        async function loadMessages(userId, silent) {
            try {
                const data = await api('/api/chat/messages/' + userId);
                if (data.user) activeChatUser = data.user;
                renderMessages(data.messages);
                if (!silent) loadConversations(); // refresh sidebar unread
            } catch (err) {
                if (!silent) showToast('加载消息失败', 'error');
            }
        }

        function renderMessages(messages) {
            const area = document.getElementById('messagesArea');
            if (!area) return;
            const wasAtBottom = area.scrollHeight - area.scrollTop - area.clientHeight < 60;

            if (!messages.length) {
                area.innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:40px;font-size:.9rem">👋 发送第一条消息吧！</div>';
                return;
            }

            let html = '';
            let lastDate = '';
            messages.forEach(m => {
                const date = new Date(m.created_at).toLocaleDateString('zh-CN');
                if (date !== lastDate) {
                    html += '<div class="msg-date-sep">' + date + '</div>';
                    lastDate = date;
                }
                const isMe = m.from_id === currentUser.id;
                const isGift = m.type === 'gift';
                const cls = isGift ? 'msg-item gift' : (isMe ? 'msg-item me' : 'msg-item other');
                const time = new Date(m.created_at).toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit'});

                if (isGift) {
                    html += `<div class="${cls}" style="align-self:center;max-width:80%"><div class="msg-bubble">${esc(m.content)}</div><span class="msg-time">${time}</span></div>`;
                } else {
                    const avatar = isMe ? currentUser.username[0].toUpperCase() : (m.from_username || '?')[0].toUpperCase();
                    html += `<div class="${cls}"><div class="msg-avatar">${avatar}</div><div class="msg-bubble">${esc(m.content)}</div><span class="msg-time">${time}</span></div>`;
                }
            });
            area.innerHTML = html;
            if (wasAtBottom) area.scrollTop = area.scrollHeight;
        }

        async function sendMsg() {
            const input = document.getElementById('msgInput');
            const content = input.value.trim();
            if (!content || !activeChatUserId) return;
            input.value = '';
            try {
                await api('/api/chat/send', { method: 'POST', body: { toUserId: activeChatUserId, content } });
                await loadMessages(activeChatUserId);
                loadConversations();
            } catch (err) {
                showToast(err.message, 'error');
                input.value = content;
            }
        }

        function openGift() {
            if (!activeChatUser) return;
            document.getElementById('giftTarget').textContent = activeChatUser.username;
            document.getElementById('giftBalance').textContent = currentUser.coins || 0;
            document.getElementById('giftAmount').value = '';
            document.getElementById('giftModal').classList.add('show');
        }

        function closeGift() {
            document.getElementById('giftModal').classList.remove('show');
        }

        async function confirmGift() {
            const amount = parseInt(document.getElementById('giftAmount').value);
            if (!amount || amount <= 0) { showToast('请输入有效金额', 'error'); return; }
            try {
                const data = await api('/api/chat/gift-coins', {
                    method: 'POST',
                    body: { toUserId: activeChatUserId, amount }
                });
                showToast(data.message, 'success');
                currentUser.coins = data.coins;
                closeGift();
                await loadMessages(activeChatUserId);
                loadConversations();
            } catch (err) {
                showToast(err.message, 'error');
            }
        }

        function formatTime(ts) {
            if (!ts) return '';
            const d = new Date(ts);
            const now = new Date();
            const diff = now - d;
            if (diff < 60000) return '刚刚';
            if (diff < 3600000) return Math.floor(diff/60000) + '分钟前';
            if (diff < 86400000) return d.toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit'});
            if (diff < 604800000) return Math.floor(diff/86400000) + '天前';
            return d.toLocaleDateString('zh-CN');
        }

        function esc(s) { if (!s) return ''; var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

        // Close gift modal on outside click
        document.getElementById('giftModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('giftModal')) closeGift();
        });
    </script>
</body>
</html>
