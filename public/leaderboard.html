<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>排行榜 - Autoconfig</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/app.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
    <style>
        .lb-page{min-height:100vh;background:var(--bg-dark);padding-top:80px}
        .lb-hero{text-align:center;padding:48px 20px 32px}
        .lb-hero h1{font-size:2.2rem;font-weight:800;margin-bottom:8px;background:linear-gradient(135deg,#fbbf24,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .lb-hero p{color:var(--text-secondary);font-size:1.05rem}

        .lb-tabs{display:flex;justify-content:center;gap:8px;margin-bottom:32px;flex-wrap:wrap;padding:0 20px}
        .lb-tab{padding:10px 24px;background:var(--bg-card);border:1px solid var(--border);border-radius:999px;color:var(--text-secondary);font-size:.9rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:var(--font-sans)}
        .lb-tab:hover{border-color:var(--border-hover)}
        .lb-tab.active{background:var(--gradient-2);border-color:var(--primary);color:#fff}

        .lb-container{max-width:800px;margin:0 auto;padding:0 24px 60px}
        .lb-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}

        .lb-row{display:flex;align-items:center;gap:16px;padding:16px 20px;border-bottom:1px solid var(--border);transition:background .2s}
        .lb-row:last-child{border-bottom:none}
        .lb-row:hover{background:var(--bg-card-hover)}

        .lb-rank{width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1rem;border-radius:50%;flex-shrink:0}
        .rank-1{background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#000;font-size:1.1rem;box-shadow:0 4px 15px rgba(251,191,36,.3)}
        .rank-2{background:linear-gradient(135deg,#d1d5db,#9ca3af);color:#000}
        .rank-3{background:linear-gradient(135deg,#d97706,#b45309);color:#fff}
        .rank-other{background:var(--bg-card-hover);color:var(--text-muted)}

        .lb-avatar{width:40px;height:40px;border-radius:50%;background:var(--gradient-2);display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:1rem;flex-shrink:0}
        .lb-info{flex:1;min-width:0}
        .lb-name{font-weight:700;color:var(--text-primary);font-size:.95rem}
        .lb-bio{font-size:.78rem;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

        .lb-stat{text-align:right;min-width:80px}
        .lb-stat-value{font-size:1.2rem;font-weight:800;background:linear-gradient(135deg,#fbbf24,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .lb-stat-label{font-size:.7rem;color:var(--text-muted)}

        .lb-badge{font-size:.75rem;padding:2px 8px;border-radius:999px;margin-left:8px}
        .lb-badge.projects{background:rgba(99,102,241,.1);color:var(--primary-light)}

        .lb-period{display:flex;justify-content:center;gap:8px;margin-bottom:20px}
        .period-btn{padding:6px 16px;background:transparent;border:1px solid var(--border);border-radius:999px;color:var(--text-muted);font-size:.8rem;cursor:pointer;font-family:var(--font-sans);transition:all .2s}
        .period-btn.active{background:var(--bg-card);color:var(--text-primary);border-color:var(--border-hover)}

        /* 热门项目卡片 */
        .lb-project-row{display:flex;align-items:center;gap:14px;padding:14px 20px;border-bottom:1px solid var(--border);transition:background .2s}
        .lb-project-row:last-child{border-bottom:none}
        .lb-project-row:hover{background:var(--bg-card-hover)}
        .lb-project-name{font-weight:700;color:var(--text-primary);font-size:.9rem}
        .lb-project-author{font-size:.78rem;color:var(--text-muted)}
        .lb-project-stats{display:flex;gap:14px;font-size:.78rem;color:var(--text-secondary)}

        .lb-empty{padding:48px;text-align:center;color:var(--text-muted);font-size:.95rem}
    </style>
</head>
<body>
    <div class="lb-page">
        <nav class="navbar scrolled">
            <div class="nav-container">
                <a href="/" class="nav-logo"><span class="logo-icon">⚡</span><span class="logo-text">Autoconfig</span></a>
                <div class="nav-links">
                    <a href="/community">社区广场</a>
                    <a href="/templates">模板商城</a>
                    <a href="/leaderboard" style="color:var(--text-primary)">排行榜</a>
                    <a href="/docs">使用文档</a>
                </div>
                <div class="nav-actions" id="navActions">
                    <a href="/login" class="btn-login">登录</a>
                    <a href="/register" class="btn-register">免费注册</a>
                </div>
            </div>
        </nav>

        <section class="lb-hero">
            <h1>🏆 排行榜</h1>
            <p>发现最受欢迎的作者和项目</p>
        </section>

        <div class="lb-tabs">
            <button class="lb-tab active" onclick="switchTab('likes',this)">❤️ 获赞排行</button>
            <button class="lb-tab" onclick="switchTab('visits',this)">👀 浏览量排行</button>
            <button class="lb-tab" onclick="switchTab('projects',this)">🔥 热门项目</button>
        </div>

        <div class="lb-period" id="periodBar">
            <button class="period-btn" onclick="setPeriod(7,this)">近7天</button>
            <button class="period-btn active" onclick="setPeriod(30,this)">近30天</button>
            <button class="period-btn" onclick="setPeriod(90,this)">近90天</button>
            <button class="period-btn" onclick="setPeriod(365,this)">全年</button>
        </div>

        <div class="lb-container">
            <div class="lb-card" id="lbContent">
                <div class="lb-empty">加载中...</div>
            </div>
        </div>

        <footer class="footer">
            <div class="footer-container"><div class="footer-bottom"><p>&copy; 2026 Autoconfig. All rights reserved.</p></div></div>
        </footer>
    </div>

    <script src="js/common.js"></script>
    <script>
        let currentTab = 'likes';
        let currentPeriod = 30;

        (async () => {
            const user = await checkAuth();
            const actions = document.getElementById('navActions');
            if (user) actions.innerHTML = `<a href="/dashboard" class="btn-register">控制台</a>`;
            loadLeaderboard();
        })();

        function switchTab(tab, el) {
            currentTab = tab;
            document.querySelectorAll('.lb-tab').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('periodBar').style.display = tab === 'likes' ? 'flex' : 'none';
            loadLeaderboard();
        }

        function setPeriod(days, el) {
            currentPeriod = days;
            document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            loadLeaderboard();
        }

        async function loadLeaderboard() {
            const container = document.getElementById('lbContent');
            container.innerHTML = '<div class="lb-empty">加载中...</div>';

            try {
                if (currentTab === 'likes') {
                    const data = await api(`/api/store/leaderboard/likes?days=${currentPeriod}`);
                    renderLikesLeaderboard(data.leaders);
                } else if (currentTab === 'visits') {
                    const data = await api('/api/store/leaderboard/visits');
                    renderVisitsLeaderboard(data.leaders);
                } else {
                    const data = await api('/api/store/leaderboard/projects');
                    renderProjectsLeaderboard(data.projects);
                }
            } catch {
                container.innerHTML = '<div class="lb-empty">加载失败</div>';
            }
        }

        function renderLikesLeaderboard(leaders) {
            const container = document.getElementById('lbContent');
            if (leaders.length === 0) {
                container.innerHTML = '<div class="lb-empty">📭 暂无数据，发布作品获取点赞吧！</div>';
                return;
            }
            container.innerHTML = leaders.map((u, i) => `
                <div class="lb-row">
                    <div class="lb-rank ${i < 3 ? 'rank-' + (i+1) : 'rank-other'}">${i < 3 ? ['🥇','🥈','🥉'][i] : i+1}</div>
                    <div class="lb-avatar">${u.username[0].toUpperCase()}</div>
                    <div class="lb-info">
                        <div class="lb-name">${esc(u.username)}<span class="lb-badge projects">${u.project_count} 个作品</span></div>
                        <div class="lb-bio">${esc(u.bio || '这个人很懒，什么都没写')}</div>
                    </div>
                    <div class="lb-stat">
                        <div class="lb-stat-value">${u.like_count}</div>
                        <div class="lb-stat-label">获赞数</div>
                    </div>
                </div>
            `).join('');
        }

        function renderVisitsLeaderboard(leaders) {
            const container = document.getElementById('lbContent');
            if (leaders.length === 0) {
                container.innerHTML = '<div class="lb-empty">📭 暂无数据</div>';
                return;
            }
            container.innerHTML = leaders.map((u, i) => `
                <div class="lb-row">
                    <div class="lb-rank ${i < 3 ? 'rank-' + (i+1) : 'rank-other'}">${i < 3 ? ['🥇','🥈','🥉'][i] : i+1}</div>
                    <div class="lb-avatar">${u.username[0].toUpperCase()}</div>
                    <div class="lb-info">
                        <div class="lb-name">${esc(u.username)}<span class="lb-badge projects">${u.project_count} 个作品</span></div>
                        <div class="lb-bio">${esc(u.bio || '这个人很懒，什么都没写')}</div>
                    </div>
                    <div class="lb-stat">
                        <div class="lb-stat-value">${formatNumber(u.total_visits)}</div>
                        <div class="lb-stat-label">总浏览量</div>
                    </div>
                </div>
            `).join('');
        }

        function renderProjectsLeaderboard(projects) {
            const container = document.getElementById('lbContent');
            if (projects.length === 0) {
                container.innerHTML = '<div class="lb-empty">📭 暂无公开项目</div>';
                return;
            }
            container.innerHTML = projects.map((p, i) => `
                <a href="/project/${p.username}/${p.slug}" class="lb-project-row" style="text-decoration:none;color:inherit">
                    <div class="lb-rank ${i < 3 ? 'rank-' + (i+1) : 'rank-other'}">${i < 3 ? ['🥇','🥈','🥉'][i] : i+1}</div>
                    <div class="lb-avatar">${p.username[0].toUpperCase()}</div>
                    <div class="lb-info">
                        <div class="lb-project-name">${esc(p.name)}</div>
                        <div class="lb-project-author">by ${esc(p.username)}</div>
                    </div>
                    <div class="lb-project-stats">
                        <span>❤️ ${p.like_count}</span>
                        <span>👀 ${formatNumber(p.visit_count)}</span>
                        <span>💬 ${p.comment_count}</span>
                    </div>
                </a>
            `).join('');
        }

        function formatNumber(n) {
            if (n >= 10000) return (n / 10000).toFixed(1) + 'w';
            if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
            return n;
        }

        function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    </script>
</body>
</html>
