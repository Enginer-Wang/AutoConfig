<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>控制台 - Autoconfig</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/app.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☁️</text></svg>">
</head>
<body>
    <div class="dashboard">
        <!-- 顶部导航 -->
        <header class="dash-header">
            <div class="dash-header-inner">
                <a href="/" class="dash-logo">
                    <span class="logo-icon">⚡</span>
                    <span class="logo-text">Autoconfig</span>
                </a>
                <nav class="dash-nav">
                    <a href="/dashboard" class="active">我的项目</a>
                    <a href="/templates">模板商城</a>
                    <a href="/community">社区广场</a>
                    <a href="/leaderboard">排行榜</a>
                    <a href="/docs">文档</a>
                    <a href="/chat" style="position:relative" id="chatNavLink">💬<span id="chatBadge" style="position:absolute;top:-6px;right:-10px;min-width:16px;height:16px;padding:0 4px;border-radius:999px;background:#ef4444;color:#fff;font-size:.6rem;font-weight:700;line-height:16px;text-align:center;display:none"></span></a>
                </nav>
                <div class="dash-user" id="dashUser">
                    <div class="dash-user-avatar" id="userAvatar">?</div>
                    <span class="dash-user-name" id="userName">加载中...</span>
                    <button class="btn-logout" onclick="logout()">退出</button>
                </div>
            </div>
        </header>

        <main class="dash-content">
            <!-- 统计信息 -->
            <div class="stats-row" id="statsRow">
                <div class="stat-card">
                    <div class="stat-label">项目数量</div>
                    <div class="stat-value" id="statProjects">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">总访问量</div>
                    <div class="stat-value" id="statVisits">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">存储空间</div>
                    <div class="stat-value" id="statStorage">0<span class="stat-unit">B</span></div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">账号创建</div>
                    <div class="stat-value" id="statJoined" style="font-size:1rem;-webkit-text-fill-color:var(--text-secondary);">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">🪙 金币</div>
                    <div class="stat-value" id="statCoins" style="-webkit-text-fill-color:#eab308;">0</div>
                </div>
            </div>

            <!-- 部署区域 -->
            <div class="deploy-section">
                <h2>🚀 部署新项目</h2>
                <div class="upload-zone" id="uploadZone">
                    <input type="file" class="upload-input" id="fileInput" accept=".zip">
                    <div class="upload-icon">📂</div>
                    <div class="upload-title">拖拽 ZIP 文件到此处，或点击选择文件</div>
                    <div class="upload-hint">支持 .zip 格式，最大 50MB</div>
                </div>

                <div class="deploy-form" id="deployForm">
                    <div class="deploy-form-header">
                        <div class="deploy-file-info">
                            <div class="deploy-file-icon">📦</div>
                            <div>
                                <div class="deploy-file-name" id="fileName">-</div>
                                <div class="deploy-file-size" id="fileSize">-</div>
                            </div>
                        </div>
                    </div>

                    <div class="deploy-form-grid">
                        <div class="form-group">
                            <label for="projectName">项目名称</label>
                            <input type="text" id="projectName" class="form-input" placeholder="我的项目">
                        </div>
                        <div class="form-group">
                            <label for="projectSlug">项目路径 (slug)</label>
                            <input type="text" id="projectSlug" class="form-input" placeholder="my-project" pattern="[a-z0-9-]+">
                        </div>
                        <div class="form-group deploy-form-full">
                            <label for="projectDesc">项目描述（可选）</label>
                            <input type="text" id="projectDesc" class="form-input" placeholder="简单介绍一下你的项目">
                        </div>
                        <div class="form-group">
                            <label class="form-checkbox">
                                <input type="checkbox" id="projectPublic">
                                <span>公开到社区广场</span>
                            </label>
                        </div>
                    </div>

                    <div class="deploy-actions">
                        <button class="btn-deploy" id="deployBtn" onclick="deployProject()">
                            ⚡ 立即部署
                        </button>
                        <button class="btn-cancel" onclick="cancelDeploy()">取消</button>
                    </div>

                    <div class="deploy-progress-bar" id="progressBar">
                        <div class="progress-track">
                            <div class="progress-fill" id="progressFill"></div>
                        </div>
                        <div class="progress-text" id="progressText">准备中...</div>
                    </div>
                </div>
            </div>

            <!-- 项目列表 -->
            <div class="projects-section">
                <h2>
                    📁 我的项目
                    <span class="projects-count" id="projectsCount"></span>
                </h2>
                <div id="projectsList" class="projects-grid">
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <div class="empty-state-text">还没有项目</div>
                        <div class="empty-state-hint">上传一个 ZIP 文件来部署你的第一个项目吧</div>
                    </div>
                </div>
            </div>

            <!-- 我的模板 -->
            <div class="projects-section">
                <h2>
                    🎨 我的模板
                    <span class="projects-count" id="templatesCount"></span>
                    <a href="/templates" style="font-size:.85rem;font-weight:500;color:var(--primary-light);margin-left:auto;text-decoration:none">去商城 →</a>
                </h2>
                <div id="templatesList" class="projects-grid">
                    <div class="empty-state">
                        <div class="empty-state-icon">🏪</div>
                        <div class="empty-state-text">还没有模板</div>
                        <div class="empty-state-hint">去 <a href="/templates" style="color:var(--primary-light)">模板商城</a> 获取精美模板吧</div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/common.js"></script>
    <script>
        let currentUser = null;
        let selectedFile = null;

        // 页面加载
        (async () => {
            currentUser = await checkAuth();
            if (!currentUser) {
                window.location.href = '/login';
                return;
            }
            renderUserInfo(currentUser);
            loadProjects();
            loadMyTemplates();
            // Load chat unread
            try {
                const ud = await api('/api/chat/unread');
                if (ud.unread > 0) {
                    const badge = document.getElementById('chatBadge');
                    badge.textContent = ud.unread > 99 ? '99+' : ud.unread;
                    badge.style.display = '';
                }
            } catch {}
        })();

        function renderUserInfo(user) {
            document.getElementById('userAvatar').textContent = user.username[0].toUpperCase();
            document.getElementById('userName').textContent = user.username;
            document.getElementById('statProjects').textContent = user.project_count || 0;
            document.getElementById('statVisits').textContent = user.total_visits || 0;
            document.getElementById('statStorage').innerHTML = formatSize(user.total_storage || 0);
            document.getElementById('statJoined').textContent = formatDate(user.created_at);
            document.getElementById('statCoins').textContent = user.coins || 0;
            // 管理员显示管理后台入口
            if (user.role === 'admin') {
                const nav = document.querySelector('.dash-nav');
                if (nav && !nav.querySelector('.admin-link')) {
                    const link = document.createElement('a');
                    link.href = '/admin';
                    link.className = 'admin-link';
                    link.style.cssText = 'color:#f59e0b;font-weight:600;';
                    link.textContent = '👑 管理后台';
                    nav.appendChild(link);
                }
            }
        }

        // ========== 文件上传 ==========
        const uploadZone = document.getElementById('uploadZone');
        const fileInput = document.getElementById('fileInput');

        uploadZone.addEventListener('click', () => fileInput.click());

        uploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadZone.classList.add('dragover');
        });

        uploadZone.addEventListener('dragleave', () => {
            uploadZone.classList.remove('dragover');
        });

        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file) handleFile(file);
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files[0]) handleFile(e.target.files[0]);
        });

        function handleFile(file) {
            if (!file.name.endsWith('.zip')) {
                showToast('请上传 ZIP 文件', 'error');
                return;
            }
            if (file.size > 50 * 1024 * 1024) {
                showToast('文件大小不能超过 50MB', 'error');
                return;
            }

            selectedFile = file;
            document.getElementById('fileName').textContent = file.name;
            document.getElementById('fileSize').textContent = formatSize(file.size);

            // 自动填充 slug
            const baseName = file.name.replace('.zip', '').toLowerCase()
                .replace(/[^a-z0-9-]/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '');
            document.getElementById('projectSlug').value = baseName;
            document.getElementById('projectName').value = file.name.replace('.zip', '');

            document.getElementById('deployForm').classList.add('show');
        }

        function cancelDeploy() {
            selectedFile = null;
            fileInput.value = '';
            document.getElementById('deployForm').classList.remove('show');
        }

        // ========== 部署 ==========
        async function deployProject() {
            if (!selectedFile) return;

            const btn = document.getElementById('deployBtn');
            const progressBar = document.getElementById('progressBar');
            const progressFill = document.getElementById('progressFill');
            const progressText = document.getElementById('progressText');

            btn.disabled = true;
            btn.textContent = '部署中...';
            progressBar.classList.add('show');
            progressFill.style.width = '0%';
            progressText.textContent = '上传文件中...';

            const formData = new FormData();
            formData.append('file', selectedFile);
            formData.append('name', document.getElementById('projectName').value);
            formData.append('slug', document.getElementById('projectSlug').value);
            formData.append('description', document.getElementById('projectDesc').value);
            formData.append('isPublic', document.getElementById('projectPublic').checked);

            try {
                // 模拟进度
                let progress = 0;
                const interval = setInterval(() => {
                    progress = Math.min(progress + Math.random() * 15, 90);
                    progressFill.style.width = progress + '%';
                    if (progress > 30) progressText.textContent = '解压部署中...';
                    if (progress > 60) progressText.textContent = '配置站点...';
                }, 200);

                const data = await fetch('/api/projects/deploy', {
                    method: 'POST',
                    body: formData,
                    credentials: 'same-origin'
                }).then(r => r.json());

                clearInterval(interval);

                if (data.error) throw new Error(data.error);

                progressFill.style.width = '100%';
                progressText.textContent = '✅ ' + data.message;

                showToast(`部署成功！访问地址: ${data.url}`, 'success');

                // 刷新数据
                setTimeout(async () => {
                    cancelDeploy();
                    progressBar.classList.remove('show');
                    btn.disabled = false;
                    btn.textContent = '⚡ 立即部署';
                    currentUser = await checkAuth();
                    renderUserInfo(currentUser);
                    loadProjects();
                }, 1500);

            } catch (err) {
                progressFill.style.width = '0%';
                progressText.textContent = '❌ 部署失败';
                showToast(err.message, 'error');
                btn.disabled = false;
                btn.textContent = '⚡ 立即部署';
            }
        }

        // ========== 项目列表 ==========
        async function loadProjects() {
            try {
                const data = await api('/api/projects');
                renderProjects(data.projects);
            } catch (err) {
                showToast('加载项目列表失败', 'error');
            }
        }

        function renderProjects(projects) {
            const container = document.getElementById('projectsList');
            document.getElementById('projectsCount').textContent = `共 ${projects.length} 个`;

            if (projects.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <div class="empty-state-text">还没有项目</div>
                        <div class="empty-state-hint">上传一个 ZIP 文件来部署你的第一个项目吧</div>
                    </div>
                `;
                return;
            }

            container.innerHTML = projects.map(p => `
                <div class="project-card">
                    <div class="project-card-header">
                        <div class="project-name">${escapeHtml(p.name)}</div>
                        <div class="project-status">
                            <span class="dot"></span> 运行中
                        </div>
                    </div>
                    <a href="/project/${currentUser.username}/${p.slug}" class="project-url">
                        ${currentUser.username}.autoconfig.dev/${p.slug}
                    </a>
                    ${p.description ? `<div class="project-desc">${escapeHtml(p.description)}</div>` : ''}
                    <div class="project-meta">
                        <span>📄 ${p.file_count} 个文件</span>
                        <span>💾 ${formatSize(p.total_size)}</span>
                        <span>👀 ${p.visit_count} 次访问</span>
                        <span>${p.is_public ? '🌐 公开' : '🔒 私密'}</span>
                    </div>
                    <div class="project-meta">
                        <span>部署于 ${formatDate(p.deployed_at)}</span>
                    </div>
                    <div class="project-actions">
                        <a href="/project/${currentUser.username}/${p.slug}" class="btn-sm btn-view">🔗 查看</a>
                        <a href="/edit-project/${p.id}" class="btn-sm btn-view" style="background:rgba(99,102,241,.15);color:#a5b4fc;border-color:rgba(99,102,241,.3)">✏️ 编辑源码</a>
                        <button class="btn-sm btn-public" onclick="togglePublic(${p.id}, ${p.is_public})">
                            ${p.is_public ? '🔒 设为私密' : '🌐 设为公开'}
                        </button>
                        <button class="btn-sm btn-delete" onclick="deleteProject(${p.id}, '${escapeHtml(p.name)}')">🗑 删除</button>
                    </div>
                </div>
            `).join('');
        }

        async function togglePublic(id, current) {
            try {
                await api(`/api/projects/${id}`, {
                    method: 'PUT',
                    body: { isPublic: !current }
                });
                showToast(current ? '已设为私密' : '已公开到社区', 'success');
                loadProjects();
            } catch (err) {
                showToast(err.message, 'error');
            }
        }

        async function deleteProject(id, name) {
            if (!confirm(`确定要删除项目「${name}」吗？此操作不可撤销。`)) return;

            try {
                await api(`/api/projects/${id}`, { method: 'DELETE' });
                showToast('项目已删除', 'success');
                currentUser = await checkAuth();
                renderUserInfo(currentUser);
                loadProjects();
            } catch (err) {
                showToast(err.message, 'error');
            }
        }

        // ========== 我的模板 ==========
        async function loadMyTemplates() {
            try {
                const data = await api('/api/store/my');
                renderMyTemplates(data.templates);
            } catch {}
        }

        function renderMyTemplates(templates) {
            const container = document.getElementById('templatesList');
            document.getElementById('templatesCount').textContent = `共 ${templates.length} 个`;
            if (templates.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🏪</div>
                        <div class="empty-state-text">还没有模板</div>
                        <div class="empty-state-hint">去 <a href="/templates" style="color:var(--primary-light)">模板商城</a> 获取精美模板吧</div>
                    </div>`;
                return;
            }
            container.innerHTML = templates.map(t => `
                <div class="project-card">
                    <div class="project-card-header">
                        <div class="project-name">${escapeHtml(t.name)}</div>
                        <div class="project-status" style="color:var(--text-muted);font-size:.75rem">
                            ${t.price === 0 ? '🆓 免费' : `🪙 ${t.price} 金币`}
                        </div>
                    </div>
                    <div class="project-desc">${escapeHtml(t.description || '')}</div>
                    <div class="project-meta">
                        <span>${t.category === 'game' ? '🎮 游戏' : '🌐 网站'}</span>
                        <span>📥 ${t.download_count} 次获取</span>
                    </div>
                    <div class="project-actions">
                        <a href="/editor/${t.id}" class="btn-sm btn-view">✏️ 编辑源码</a>
                    </div>
                </div>
            `).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
