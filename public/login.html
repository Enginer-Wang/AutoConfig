<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - Autoconfig</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/app.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☁️</text></svg>">
</head>
<body>
    <div class="auth-page">
        <div class="hero-bg">
            <div class="hero-gradient"></div>
            <div class="hero-grid"></div>
            <div class="floating-orb orb-1"></div>
            <div class="floating-orb orb-2"></div>
        </div>

        <div class="auth-card">
            <div class="auth-logo">
                <a href="/">
                    <span class="logo-icon">⚡</span>
                    <span class="logo-text">Autoconfig</span>
                </a>
            </div>
            <h1 class="auth-title">欢迎回来</h1>
            <p class="auth-subtitle">登录你的 Autoconfig 账号</p>

            <div class="form-error" id="errorMsg"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="login">用户名或邮箱</label>
                    <input type="text" id="login" class="form-input" placeholder="输入用户名或邮箱" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" class="form-input" placeholder="输入密码" required autocomplete="current-password">
                </div>
                <button type="submit" class="form-btn" id="submitBtn">登 录</button>
            </form>

            <p class="form-footer">
                还没有账号？ <a href="/register">立即注册</a>
            </p>
        </div>
    </div>

    <script src="js/common.js"></script>
    <script>
        // 已登录则跳转
        (async () => {
            const user = await checkAuth();
            if (user) window.location.href = '/dashboard';
        })();

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const errorEl = document.getElementById('errorMsg');

            btn.disabled = true;
            btn.textContent = '登录中...';
            errorEl.classList.remove('show');

            try {
                const data = await api('/api/auth/login', {
                    method: 'POST',
                    body: {
                        login: document.getElementById('login').value,
                        password: document.getElementById('password').value
                    }
                });

                showToast('登录成功！', 'success');
                setTimeout(() => window.location.href = '/dashboard', 500);
            } catch (err) {
                errorEl.textContent = err.message;
                errorEl.classList.add('show');
                btn.disabled = false;
                btn.textContent = '登 录';
            }
        });
    </script>
</body>
</html>
